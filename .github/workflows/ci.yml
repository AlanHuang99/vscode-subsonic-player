name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npm audit

      - name: Package VSIX
        run: npx @vscode/vsce package -o subsonic-player.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: subsonic-player-vsix
          path: subsonic-player.vsix
