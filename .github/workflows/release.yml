name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npm audit

      - name: Package VSIX
        run: npx @vscode/vsce package -o subsonic-player.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: subsonic-player.vsix
          generate_release_notes: true

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: |
          npx ovsx create-namespace alanhuang -p "$OVSX_PAT" || true
          npx ovsx publish subsonic-player.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
